services:
  postgres:
    image: postgres:16
    container_name: nest-js-catch-up-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nest_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nest_app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
